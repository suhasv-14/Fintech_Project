{% extends "base.html" %}

{% block title %}Add Expense — SmartSpend{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1><i class="bi bi-plus-circle" style="margin-right: 10px; font-size: 24px;"></i>Add Expense</h1>
        <p class="subtitle">Record a new expense entry</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('add_expense') }}" onsubmit="return validateExpenseForm(this)">
        <div class="form-group">
            <label for="category">Category</label>
            <select class="form-control" id="category" name="category" required>
                <option value="">Select a category</option>
                {% for cat in categories %}
                <option value="{{ cat }}">
                    {{ cat }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" class="form-control" id="amount" name="amount"
                       placeholder="0.00" step="0.01" min="0.01" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" class="form-control" id="date" name="date"
                       value="{{ today }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <input type="text" class="form-control" id="description" name="description"
                   placeholder="e.g., Lunch at cafe, Uber ride...">
        </div>

        <div class="d-flex gap-1" style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Save Expense
            </button>
            <a href="{{ url_for('expenses') }}" class="btn btn-secondary">
                <i class="bi bi-x-lg"></i> Cancel
            </a>
        </div>
    </form>
</div>

<!-- Quick Category Selection Cards -->
<div style="margin-top: 32px;">
    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">
        <i class="bi bi-grid" style="margin-right: 8px;"></i>Quick Select Category
    </h3>
    <div class="d-flex gap-1 flex-wrap">
        {% for cat in categories %}
        <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('category').value='{{ cat }}';"
                style="border-color: {{ category_colors.get(cat, '#95a5a6') }}30;">
            <i class="bi {{ category_icons.get(cat, 'bi-three-dots') }}" style="color: {{ category_colors.get(cat, '#95a5a6') }};"></i>
            {{ cat }}
        </button>
        {% endfor %}
    </div>
</div>
{% endblock %}
