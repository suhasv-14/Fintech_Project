{% extends "base.html" %}

{% block title %}Edit Expense — SmartSpend{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1><i class="bi bi-pencil-square" style="margin-right: 10px; font-size: 24px;"></i>Edit Expense</h1>
        <p class="subtitle">Update this expense entry</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense['id']) }}"
          onsubmit="return validateExpenseForm(this)">
        <div class="form-group">
            <label for="category">Category</label>
            <select class="form-control" id="category" name="category" required>
                <option value="">Select a category</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if expense['category'] == cat %}selected{% endif %}>
                    {{ cat }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" class="form-control" id="amount" name="amount"
                       value="{{ expense['amount'] }}" step="0.01" min="0.01" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" class="form-control" id="date" name="date"
                       value="{{ expense['date'] }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <input type="text" class="form-control" id="description" name="description"
                   value="{{ expense['description'] or '' }}"
                   placeholder="e.g., Lunch at cafe, Uber ride...">
        </div>

        <div class="d-flex gap-1" style="margin-top: 24px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Update Expense
            </button>
            <a href="{{ url_for('expenses') }}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </form>
</div>
{% endblock %}
